substitutions:
  _SERVICE_NAME: career-os-backend
  _REGION: us-east1
  _AR_REPO: career-os
  _IMAGE_NAME: backend

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --set-env-vars
      - SEED_DEV_USERS=0,OUTLOOK_TENANT_ID=common
      - --set-secrets
      - DATABASE_URL=career-os-database-url:latest,OPENAI_API_KEY=career-os-openai-key:latest,SITE_GATE_PASSWORD=career-os-gate-password:latest,GATE_JWT_SECRET=career-os-gate-jwt-secret:latest,CLOUDINARY_CLOUD_NAME=career-os-cloudinary-cloud-name:latest,CLOUDINARY_API_KEY=career-os-cloudinary-api-key:latest,CLOUDINARY_API_SECRET=career-os-cloudinary-api-secret:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA
